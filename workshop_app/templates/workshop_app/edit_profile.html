{% extends "workshop_app/base.html" %}

{% block title %}Edit Profile{% endblock %}

{% block content %}
<div class="container" style="max-width:580px;padding-top:1.5rem">

    <div class="page-header">
        <div>
            <h2>Edit Profile</h2>
            <p class="text-muted" style="margin:0;font-size:.875rem">Keep your info up to date</p>
        </div>
    </div>

    <div class="card">
        <div class="card-body">
            <form action="{{ URL_ROOT }}/edit_profile/" method="post">
                {% csrf_token %}
                <style>
                    .ep-form th, .ep-form td { border:none; padding:0; display:block; width:100%; }
                    .ep-form tr { display:block; margin-bottom:1rem; }
                    .errorlist { list-style:none; padding:0; margin:4px 0 0; }
                    .errorlist li { color:var(--clr-danger); font-size:.8rem; }
                </style>
                <table class="ep-form" style="width:100%">
                    {{ form.as_table }}
                </table>
                <div style="display:flex;gap:.75rem;flex-wrap:wrap;margin-top:.5rem">
                    <button class="btn btn-primary btn-lg" type="submit">
                        <span class="material-icons" style="font-size:16px;vertical-align:middle;margin-right:4px">save</span>
                        Save Changes
                    </button>
                    <a href="{% url 'workshop_app:view_own_profile' %}" class="btn btn-outline-info btn-lg">Cancel</a>
                </div>
            </form>
        </div>
    </div>

</div>
{% endblock %}
